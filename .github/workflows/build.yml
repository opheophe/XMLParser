name: Build and Release XMLParser

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Triggers a full release when you push a tag like v1.0.2
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Critical for Mac universal builds
          if [ "${{ matrix.os }}" = "macos-latest" ]; then pip install macholib; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build App
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows Build
            pyinstaller --onefile --windowed --icon=icon.ico XMLParser.py
          else
            # Mac Build with Universal2 support (Intel + Apple Silicon)
            pyinstaller --onefile --windowed --icon=icon.icns --target-arch universal2 XMLParser.py
            # Zip the bundle to preserve permissions and folder structure
            zip -r dist/XMLParser_Mac.zip dist/XMLParser.app
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bin-${{ matrix.os }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: all-bins
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-bins/XMLParser.exe
            all-bins/XMLParser_Mac.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}