name: Build and Release XMLParser

on:
  push:
    tags:
      - 'v*' # Triggers when you create a tag like v1.0.1 in GitHub Desktop
  workflow_dispatch: # Allows you to run it manually if needed

permissions:
  contents: write # Essential for the robot to upload files to the Release page

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build App
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Build Windows EXE
            pyinstaller --onefile --windowed --icon=icon.ico XMLParser.py
          else
            # Build Mac App
            pyinstaller --onefile --windowed --icon=icon.icns XMLParser.py
            # Zip the Mac folder so GitHub can upload it as a single file
            zip -r dist/XMLParser_Mac.zip dist/XMLParser.app
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bin-${{ matrix.os }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: all-bins
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-bins/XMLParser.exe
            all-bins/XMLParser_Mac.zip
          generate_release_notes: true