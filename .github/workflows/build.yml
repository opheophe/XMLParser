name: Build XMLParser App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        # This creates two separate "robots"—one for PC and one for Mac
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up subsequent builds

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # If you have a requirements.txt, it installs it. If not, it skips safely.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build with PyInstaller
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows build using the .ico file
            pyinstaller --onefile --windowed --icon=icons.ico XMLParser.py
          else
            # Mac build using the .icns file
            pyinstaller --onefile --windowed --icon=icons.icns XMLParser.py
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XMLParser-for-${{ matrix.os }}
          # PyInstaller puts the finished app in the 'dist' folder
          path: dist/