name: Build XMLParser App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # This tells GitHub to use the new Node 24 engine now and silences the warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 # Updated

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build with PyInstaller
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --onefile --windowed --icon=icons.ico XMLParser.py
          else
            pyinstaller --onefile --windowed --icon=icons.icns XMLParser.py
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6 # Updated
        with:
          name: XMLParser-for-${{ matrix.os }}
          path: dist/