name: Build and Release XMLParser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        # Using macos-15-intel (Intel) and macos-26 (Apple Silicon) for 2026 compatibility
        os: [windows-latest, macos-15-intel, macos-26]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install DMG creator tool on Mac runners
          if [[ "${{ matrix.os }}" == macos* ]]; then brew install create-dmg; fi
        shell: bash

      - name: Write version file
        run: echo "${{ github.ref_name }}" > version.txt
        shell: bash

      - name: Build App
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --onefile --windowed --icon=icon.ico --add-data "version.txt;." XMLParser.py
          else
            # 1. Build the Mac App
            pyinstaller --onedir --windowed --icon=icon.icns --exclude-module matplotlib --exclude-module scipy --add-data "version.txt:." XMLParser.py
            
            # 2. Determine architecture for the filename
            if [ "${{ matrix.os }}" = "macos-15-intel" ]; then
              ARCH="Intel"
            else
              ARCH="Silicon"
            fi
            
            # 3. Create a professional DMG installer
            create-dmg \
              --volname "XMLParser ${ARCH} Installer" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "XMLParser.app" 175 120 \
              --hide-extension "XMLParser.app" \
              --app-drop-link 425 120 \
              "dist/XMLParser_Mac_${ARCH}.dmg" \
              "dist/XMLParser.app"
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bin-${{ matrix.os }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: all-bins
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-bins/XMLParser.exe
            all-bins/XMLParser_Mac_Intel.dmg
            all-bins/XMLParser_Mac_Silicon.dmg
          generate_release_notes: true
          body: |
            ## Installation Instructions

            ### Windows
            Download `XMLParser.exe` and run it directly.

            ### macOS
            **Important**: Due to macOS security, right-click the app and select "Open" the first time.
            This is normal for apps not from the App Store.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge old releases (keep 10 most recent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # List all releases sorted by creation date (newest first), skip the 10 most recent
          gh release list --repo "$REPO" --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[10:] | .[].tagName' \
          | while read tag; do
              echo "Deleting release and tag: $tag"
              gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag
            done