name: Build and Release XMLParser

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0, v2.1, etc.
  workflow_dispatch:

permissions:
  contents: write # Crucial: Allows the robot to create a release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash
      - name: Build
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --onefile --windowed --icon=icon.ico XMLParser.py
          else
            pyinstaller --onefile --windowed --icon=icon.icns XMLParser.py
          fi
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bin-${{ matrix.os }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build # Wait for both builds to finish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') # Only run if we pushed a tag
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: all-bins
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-bins/XMLParser.exe
            all-bins/XMLParser.app
          generate_release_notes: true