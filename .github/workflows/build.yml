name: Build and Release XMLParser

on:
  push:
    branches: [ "main" ] # Run build on every push to main
    tags:
      - 'v*'            # Also run when a tag is created
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash
      - name: Build
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --onefile --windowed --icon=icon.ico XMLParser.py
          else
            pyinstaller --onefile --windowed --icon=icon.icns XMLParser.py
            zip -r dist/XMLParser_Mac.zip dist/XMLParser.app
          fi
        shell: bash
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bin-${{ matrix.os }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # THIS LINE IS THE KEY: 
    # It says: "Only run this specific job if the thing that triggered the script was a Tag"
    if: startsWith(github.ref, 'refs/tags/') 
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: all-bins
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-bins/XMLParser.exe
            all-bins/XMLParser_Mac.zip
          generate_release_notes: true