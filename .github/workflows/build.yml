name: Build and Release XMLParser

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        # WE UPDATED THESE LABELS:
        os: [windows-latest, macos-15-intel, macos-26]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build App
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --onefile --windowed --icon=icon.ico XMLParser.py
          elif [ "${{ matrix.os }}" = "macos-15-intel" ]; then
            # The Intel-specific build
            pyinstaller --onefile --windowed --icon=icon.icns XMLParser.py
            zip -r dist/XMLParser_Intel_Mac.zip dist/XMLParser.app
          else
            # The Apple Silicon build (macos-26)
            pyinstaller --onefile --windowed --icon=icon.icns XMLParser.py
            zip -r dist/XMLParser_Silicon_Mac.zip dist/XMLParser.app
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bin-${{ matrix.os }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: all-bins
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-bins/XMLParser.exe
            all-bins/XMLParser_Intel_Mac.zip
            all-bins/XMLParser_Silicon_Mac.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}